name: Build and Publish Libraries

on:
  workflow_call:
    outputs:
      published-version:
        description: "Published version"
        value: ${{ jobs.build-and-publish.outputs.version }}
      packages-published:
        description: "Whether packages were published"
        value: ${{ jobs.build-and-publish.outputs.published }}

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      version: ${{ steps.publish.outputs.version }}
      published: ${{ steps.publish.outputs.published }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Enable corepack and install pnpm
        run: |
          corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - uses: google/wireit@setup-github-actions-caching/v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build stencil library
        run: pnpm -F @infineon/infineon-design-system-stencil build

      - name: Generate examples
        run: pnpm run generate:examples

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "❌ Error: Generated files have uncommitted changes!"
            echo "Please run 'pnpm run build' and 'pnpm run generate:examples' locally and commit the changes."
            echo ""
            echo "Changed files:"
            git diff --name-only
            git diff --cached --name-only
            exit 1
          fi
          echo "✅ All generated files are up to date"

      - name: Build Vue wrapper library
        run: pnpm -F @infineon/infineon-design-system-vue build

      - name: Build React wrapper library
        run: pnpm -F @infineon/infineon-design-system-react build

      - name: Build Angular wrapper library
        run: pnpm -F @infineon/infineon-design-system-angular build

      - name: Build MCP server
        run: pnpm -F @infineon/infineon-design-system-mcp build

      - name: Configure git for Auto
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish packages
        id: publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEBEX_TOKEN: ${{ secrets.WEBEX_TOKEN }}
          WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
        run: |
          auto_dry_run() {
            local cmd=$1
            shift
            local version

            version=$(pnpm exec auto "$cmd" "$@" --dry-run --quiet 2>/dev/null)
            if [ $? -ne 0 ]; then
              echo "$cmd dry run failed, running again to print error message..."
              pnpm exec auto "$cmd" --dry-run
              exit 1
            fi

            echo "$version"
          }

          SHIPIT_VERSION=$(auto_dry_run shipit)
          if [ -n "$SHIPIT_VERSION" ]; then
            pnpm exec auto shipit
            echo "version=$SHIPIT_VERSION" >> $GITHUB_OUTPUT
            echo "published=true" >> $GITHUB_OUTPUT
            echo "Published version: $SHIPIT_VERSION"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CANARY_VERSION=$(auto_dry_run canary --force)
            if [ -z "$CANARY_VERSION" ]; then
              echo "❌ canary version is empty; cannot continue."
              exit 1
            fi

            pnpm exec auto canary --force
            echo "version=$CANARY_VERSION" >> $GITHUB_OUTPUT
            echo "published=true" >> $GITHUB_OUTPUT
            echo "Published canary version: $CANARY_VERSION"
            exit 0
          fi

          LATEST_VERSION=$(npm view @infineon/infineon-design-system-stencil dist-tags.latest)
          if [ -z "$LATEST_VERSION" ]; then
            echo "❌ Failed to resolve latest version from npm."
            exit 1
          fi

          echo "No new version to publish. Falling back to latest version: $LATEST_VERSION"
          
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "published=false" >> $GITHUB_OUTPUT
          echo "Resolved latest version: $LATEST_VERSION"