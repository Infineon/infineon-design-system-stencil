name: Build and Deploy Examples

on:
  workflow_call:
    inputs:
      package-version:
        required: true
        type: string
        description: 'Package version to use'
      name:
        required: false
        type: string
        description: 'Name of the example to build'
      deployment:
        required: false
        type: string
        description: 'Deployment target (pr, production, none)'
        default: 'pr'
    outputs:
      deployment-url:
        description: "Deployed URL"
        value: ${{ jobs.deploy.outputs.url }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - uses: pnpm/action-setup@v2
      
      - name: Update ${{ inputs.name }} to use published version
        run: |
          find examples/${{ inputs.name }} -name "package.json" -exec \
            sed -i "s/\"workspace:\*\"/\"${{ inputs.package-version }}\"/" {} \;
      
      - name: Install dependencies
        run: pnpm install --filter='${{ inputs.name }}' 
      
      - name: Build ${{ inputs.name }} example
        run: |
          BASE_PATH="${{ inputs.base-path }}" pnpm --filter='${{ inputs.name }}' build
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ inputs.name }}-build
          path: examples/${{ inputs.name }}/dist/
          retention-days: 1

  deploy-pr:
    needs: build
    if: ${{ inputs.deployment == 'pr' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: ${{ inputs.name }}-build
          path: deploy-files/
      
      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: deploy-files/
          preview-branch: gh-pages-preview
          umbrella-dir: pr-preview-${{ inputs.name }}

  deploy-production:
    needs: build
    if: ${{ inputs.deployment == 'production' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: ${{ inputs.name }}-build
          path: deploy-files/
      
      - name: Deploy to Production
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy-files/
          destination_dir: ${{ inputs.name }}
