name: Main Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches:
      - master

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: true

jobs:
  check-skip:
  # Job to check if the commit message contains 'ci skip' or 'skip ci'
  # Only works on push events not on pull_request events
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        run: |
          if [[ "${{ contains(github.event.head_commit.message, 'ci skip') || contains(github.event.head_commit.message, 'skip ci') }}" == "true" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping CI"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Running CI"
          fi
    permissions:
      contents: read

  release-label-gate:
    needs: check-skip
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    outputs:
      has_label: ${{ steps.gate.outputs.has_label }}
    steps:
      - id: gate
        run: |
          node <<'NODE'
          const fs = require('fs');
          const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, 'utf8'));
          const labels = (event.pull_request?.labels || []).map(label => label.name);
          const required = new Set(['patch', 'minor', 'major', 'skip-release']);
          const hasLabel = !event.pull_request || labels.some(label => required.has(label));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `has_label=${hasLabel}\n`);
          NODE

  test:
    needs: [check-skip, release-label-gate]
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-test-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Enable corepack and install pnpm
        run: |
          corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm -r test
    permissions:
      contents: read

  build-publish-library:
    needs: [check-skip, release-label-gate, test]
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    uses: ./.github/workflows/shared-build-publish-libraries.yml
    concurrency:
      group: ${{ github.workflow }}-build-publish-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    secrets: inherit
    permissions:
      contents: write
      pages: write
      actions: write
      issues: write
      pull-requests: write  


  build-storybook:
    needs: [check-skip, release-label-gate, test, build-publish-library]
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    uses: ./.github/workflows/shared-build-storybook.yml
    with:
      package-version: ${{ needs.build-publish-library.outputs.published-version }}
      name: storybook
      required-packages: '@infineon/infineon-design-system-stencil'
    permissions:
      contents: write
      pages: write

  build-html-cdn-example:
    needs: [check-skip, release-label-gate, test, build-publish-library]
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    uses: ./.github/workflows/shared-build-example.yml
    with:
      name: html-cdn-example
      base-path: examples/html-cdn-example
      deploy-path: dist
      package-version: ${{ needs.build-publish-library.outputs.published-version }}
      required-packages: '@infineon/infineon-design-system-stencil'
    permissions:
      contents: write
      pages: write

  build-html-vite-example:
    needs: [check-skip, release-label-gate, test, build-publish-library]
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    uses: ./.github/workflows/shared-build-example.yml
    with:
      name: html-vite-example
      base-path: examples/html-vite-example
      deploy-path: dist
      package-version: ${{ needs.build-publish-library.outputs.published-version }}
      required-packages: '@infineon/infineon-design-system-stencil'
    permissions:
      contents: write
      pages: write

  build-angular-module-example:
    needs: [check-skip, release-label-gate, test, build-publish-library]
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    uses: ./.github/workflows/shared-build-example.yml
    with:
      name: angular-module-example
      base-path: examples/angular-module-example
      deploy-path: dist/browser
      package-version: ${{ needs.build-publish-library.outputs.published-version }}
      required-packages: '@infineon/infineon-design-system-stencil,@infineon/infineon-design-system-angular'
    permissions:
      contents: write
      pages: write

  build-angular-standalone-example:
    needs: [check-skip, release-label-gate, test, build-publish-library]
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    uses: ./.github/workflows/shared-build-example.yml
    with:
      name: angular-standalone-example
      base-path: examples/angular-standalone-example
      deploy-path: dist/browser
      package-version: ${{ needs.build-publish-library.outputs.published-version }}
      required-packages: '@infineon/infineon-design-system-stencil,@infineon/infineon-design-system-angular'
    permissions:
      contents: write
      pages: write

  build-react-example:
    needs: [check-skip, release-label-gate, test, build-publish-library]
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    uses: ./.github/workflows/shared-build-example.yml
    with:
      name: react-example
      base-path: examples/react-example
      deploy-path: dist
      package-version: ${{ needs.build-publish-library.outputs.published-version }}
      required-packages: '@infineon/infineon-design-system-stencil,@infineon/infineon-design-system-react'
    permissions:
      contents: write
      pages: write

  build-vue-example:
    needs: [check-skip, release-label-gate, test, build-publish-library]
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    uses: ./.github/workflows/shared-build-example.yml
    with:
      name: vue-example
      base-path: examples/vue-example
      deploy-path: dist
      package-version: ${{ needs.build-publish-library.outputs.published-version }}
      required-packages: '@infineon/infineon-design-system-stencil,@infineon/infineon-design-system-vue'
    permissions:
      contents: write
      pages: write

  deploy-storybook:
    needs: [check-skip, release-label-gate, build-publish-library, build-storybook]
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    uses: ./.github/workflows/shared-deploy-storybook.yml
    with:
      name: storybook
      deploy-path: storybook-static
      deployment: ${{ github.event_name == 'pull_request' && 'pr' || 'production' }}
      destination-dir: storybook
      umbrella-dir: pr-preview-storybook
    permissions:
      contents: write
      pages: write

  deploy-html-cdn-example:
    needs: [check-skip, release-label-gate, build-html-cdn-example, deploy-storybook]
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    uses: ./.github/workflows/shared-deploy-example.yml
    with:
      name: html-cdn-example
      label: HTML CDN Example
      deploy-path: dist
      deployment: ${{ github.event_name == 'pull_request' && 'pr' || 'production' }}
      destination-dir: html-cdn-example
      umbrella-dir: pr-preview-html-cdn-example
    permissions:
      contents: write
      pages: write

  deploy-html-vite-example:
    needs: [check-skip, release-label-gate, build-html-vite-example, deploy-html-cdn-example]
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    uses: ./.github/workflows/shared-deploy-example.yml
    with:
      name: html-vite-example
      label: HTML Vite Example
      deploy-path: dist
      deployment: ${{ github.event_name == 'pull_request' && 'pr' || 'production' }}
      destination-dir: html-vite-example
      umbrella-dir: pr-preview-html-vite-example
    permissions:
      contents: write
      pages: write

  deploy-angular-module-example:
    needs: [check-skip, release-label-gate, build-angular-module-example, deploy-html-vite-example]
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    uses: ./.github/workflows/shared-deploy-example.yml
    with:
      name: angular-module-example
      label: Angular Example (Module)
      deploy-path: dist/browser
      deployment: ${{ github.event_name == 'pull_request' && 'pr' || 'production' }}
      destination-dir: angular-module-example
      umbrella-dir: pr-preview-angular-module-example
    permissions:
      contents: write
      pages: write

  deploy-angular-standalone-example:
    needs: [check-skip, release-label-gate, build-angular-standalone-example, deploy-angular-module-example]
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    uses: ./.github/workflows/shared-deploy-example.yml
    with:
      name: angular-standalone-example
      label: Angular Example (Standalone)
      deploy-path: dist/browser
      deployment: ${{ github.event_name == 'pull_request' && 'pr' || 'production' }}
      destination-dir: angular-standalone-example
      umbrella-dir: pr-preview-angular-standalone-example
    permissions:
      contents: write
      pages: write

  deploy-react-example:
    needs: [check-skip, release-label-gate, build-react-example, deploy-angular-standalone-example]
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    uses: ./.github/workflows/shared-deploy-example.yml
    with:
      name: react-example
      label: React Example
      deploy-path: dist
      deployment: ${{ github.event_name == 'pull_request' && 'pr' || 'production' }}
      destination-dir: react-example
      umbrella-dir: pr-preview-react-example
    permissions:
      contents: write
      pages: write

  deploy-vue-example:
    needs: [check-skip, release-label-gate, build-vue-example, deploy-react-example]
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    uses: ./.github/workflows/shared-deploy-example.yml
    with:
      name: vue-example
      label: Vue Example
      deploy-path: dist
      deployment: ${{ github.event_name == 'pull_request' && 'pr' || 'production' }}
      destination-dir: vue-example
      umbrella-dir: pr-preview-vue-example
    permissions:
      contents: write
      pages: write

  comment-pr:
    needs:
      - check-skip
      - release-label-gate
      - build-publish-library
      - storybook
      - deploy-html-cdn-example
      - deploy-html-vite-example
      - deploy-angular-module-example
      - deploy-angular-standalone-example
      - deploy-react-example
      - deploy-vue-example
    if: ${{ needs.check-skip.outputs.skip == 'false' && github.event_name == 'pull_request' && github.event.action != 'closed' && needs.release-label-gate.outputs.has_label == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR with preview links
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: "PR Preview Links"
          message: |
            ### Storybook Preview
            ${{ needs.storybook.result == 'success' && format('- [Storybook]({0})', needs.storybook.outputs.url) || '- ❌ Storybook build failed' }}

            ### Preview Links for Deployed Examples
            ${{ needs.deploy-html-cdn-example.result == 'success' && format('- [HTML CDN Example]({0})', needs.deploy-html-cdn-example.outputs.url) || '- ❌ HTML CDN Example build failed' }}
            ${{ needs.deploy-html-vite-example.result == 'success' && format('- [HTML Vite Example]({0})', needs.deploy-html-vite-example.outputs.url) || '- ❌ HTML Vite Example build failed' }}
            ${{ needs.deploy-angular-module-example.result == 'success' && format('- [Angular Example (Module)]({0})', needs.deploy-angular-module-example.outputs.url) || '- ❌ Angular Example (Module) build failed' }}
            ${{ needs.deploy-angular-standalone-example.result == 'success' && format('- [Angular Example (Standalone)]({0})', needs.deploy-angular-standalone-example.outputs.url) || '- ❌ Angular Example (Standalone) build failed' }}
            ${{ needs.deploy-react-example.result == 'success' && format('- [React Example]({0})', needs.deploy-react-example.outputs.url) || '- ❌ React Example build failed' }}
            ${{ needs.deploy-vue-example.result == 'success' && format('- [Vue Example]({0})', needs.deploy-vue-example.outputs.url) || '- ❌ Vue Example build failed' }}

            Version: ${{ needs.build-publish-library.outputs.published-version }}