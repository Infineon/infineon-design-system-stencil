<div class="ng-model-example">
	<h3>Boolean inputs (same ngModel)</h3>
	<ifx-checkbox
		name="ngModelCheckbox"
		[(ngModel)]="booleanValue">
		Checkbox bound via ngModel
	</ifx-checkbox>

	<ifx-switch
		name="ngModelSwitch"
		[(ngModel)]="booleanValue">
		Switch bound via ngModel
	</ifx-switch>

	<h3>Text inputs (bound to the same value)</h3>
	<ifx-search-field
		name="ngModelSearchField"
		[(ngModel)]="textValue"
		show-delete-icon="true"
		placeholder="Search..."></ifx-search-field>

	<ifx-text-field
		name="ngModelTextField"
		[(ngModel)]="textValue"
		show-delete-icon="true"
		placeholder="Type here..."></ifx-text-field>

	<ifx-textarea
		name="ngModelTextarea"
		[(ngModel)]="textValue"
		label="Message"
		placeholder="Write a longer message..."></ifx-textarea>

	<ifx-search-bar
		name="ngModelSearchBar"
		[(ngModel)]="textValue"
		is-open="true"
		autocomplete="on"></ifx-search-bar>

	<h3>Slider input</h3>
	<ifx-slider
		name="ngModelSlider"
		[(ngModel)]="sliderValue"
		min="0"
		max="100"
		step="1"
		show-percentage="true"></ifx-slider>

	<ifx-slider
		name="ngModelSliderMirror"
		[(ngModel)]="sliderValue"
		min="0"
		max="100"
		step="1"
		show-percentage="true"></ifx-slider>
</div>
