  <ifx-status
    label="text"
    border="{{ controlledProps['border'] }}"
    color="{{ controlledProps['color'] }}"></ifx-status>
<h3 class="controls-title">Controls</h3>
<div class="controls">
  <ifx-button variant="secondary" (click)="toggleBorder()">Toggle Border</ifx-button>
  <ifx-button variant="secondary" (click)="toggleColor()">Toggle Color</ifx-button>
</div>

<div class="state">
    <div><b>border:</b> {{ border }}</div>
    <div><b>color:</b> {{ colorOptions[colorIndex] }}</div>
</div>


<details class="code-details">
  <summary>View Code</summary>
  <div class="code-blocks">
    <h3>ifx-status-example.ts</h3>
    <pre><code class="language-typescript" [innerHTML]="tsCode"></code></pre>
    
    <h3>ifx-status-example.html</h3>
    <pre><code class="language-markup" [innerHTML]="htmlCode"></code></pre>
  </div>
</details>
