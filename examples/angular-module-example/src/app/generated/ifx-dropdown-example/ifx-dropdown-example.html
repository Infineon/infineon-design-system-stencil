  <ifx-dropdown
    placement="bottom-start"
    [defaultOpen]="false"
    [noCloseOnOutsideClick]="false"
    [noCloseOnMenuClick]="false"
    [noAppendToBody]="true"
    [disabled]="false">
    <ifx-dropdown-trigger-button
      variant="primary"
      (ifxClose)="handleClose($any($event))"
      (ifxDropdown)="handleDropdown($any($event))"
      (ifxOpen)="handleOpen($any($event))"
      (ifxDropdownMenuItem)="handleDropdownMenuItem($any($event))"
      (menuSize)="handleMenuSize($any($event))"
      (ifxDropdownItem)="handleDropdownItem($any($event))">Dropdown</ifx-dropdown-trigger-button>
    <ifx-dropdown-menu
      size="m"
      (ifxClose)="handleClose($any($event))"
      (ifxDropdown)="handleDropdown($any($event))"
      (ifxOpen)="handleOpen($any($event))"
      (ifxDropdownMenuItem)="handleDropdownMenuItem($any($event))"
      (menuSize)="handleMenuSize($any($event))"
      (ifxDropdownItem)="handleDropdownItem($any($event))">
      <ifx-dropdown-item
        icon="c-info-16"
        target="_self"
        href=""
        [error]="false"
        (ifxClose)="handleClose($any($event))"
        (ifxDropdown)="handleDropdown($any($event))"
        (ifxOpen)="handleOpen($any($event))"
        (ifxDropdownMenuItem)="handleDropdownMenuItem($any($event))"
        (menuSize)="handleMenuSize($any($event))"
        (ifxDropdownItem)="handleDropdownItem($any($event))">Menu Item</ifx-dropdown-item>
      <ifx-dropdown-item
        icon="c-info-16"
        target="_self"
        href=""
        [error]="false">Menu Item</ifx-dropdown-item>
      <ifx-dropdown-item
        icon="c-info-16"
        target="_self"
        href=""
        [error]="false">Menu Item</ifx-dropdown-item>
      <ifx-dropdown-item
        icon="c-info-16"
        target="_self"
        href=""
        [error]="false">Menu Item</ifx-dropdown-item>
      <ifx-dropdown-item
        icon="c-info-16"
        target="_self"
        href=""
        [error]="false">Menu Item</ifx-dropdown-item>
    </ifx-dropdown-menu>
  </ifx-dropdown>

<details class="code-details">
  <summary>View Code</summary>
  <div class="code-blocks">
    <h3>ifx-dropdown-example.ts</h3>
    <pre><code class="language-typescript" [innerHTML]="tsCode"></code></pre>
    
    <h3>ifx-dropdown-example.html</h3>
    <pre><code class="language-markup" [innerHTML]="htmlCode"></code></pre>
  </div>
</details>
