  <ifx-radio-button
    name="radio-button"
    value="radio"
    (ifxChange)="handleChange($any($event))"
    (ifxError)="handleError($any($event))"
    error="{{ controlledProps['error'] }}"
    disabled="{{ controlledProps['disabled'] }}"
    checked="{{ controlledProps['checked'] }}"
    size="{{ controlledProps['size'] }}">Text</ifx-radio-button>
<h3 class="controls-title">Controls</h3>
<div class="controls">
  <ifx-button variant="secondary" (click)="toggleError()">Toggle Error</ifx-button>
  <ifx-button variant="secondary" (click)="toggleDisabled()">Toggle Disabled</ifx-button>
  <ifx-button variant="secondary" (click)="toggleChecked()">Toggle Checked</ifx-button>
  <ifx-button variant="secondary" (click)="toggleSize()">Toggle Size</ifx-button>
</div>

<div class="state">
    <div><b>error:</b> {{ error }}</div>
    <div><b>disabled:</b> {{ disabled }}</div>
    <div><b>checked:</b> {{ checked }}</div>
    <div><b>size:</b> {{ sizeOptions[sizeIndex] }}</div>
</div>


<details class="code-details">
  <summary>View Code</summary>
  <div class="code-blocks">
    <h3>ifx-radio-button-example.ts</h3>
    <pre><code class="language-typescript" [innerHTML]="tsCode"></code></pre>
    
    <h3>ifx-radio-button-example.html</h3>
    <pre><code class="language-markup" [innerHTML]="htmlCode"></code></pre>
  </div>
</details>
