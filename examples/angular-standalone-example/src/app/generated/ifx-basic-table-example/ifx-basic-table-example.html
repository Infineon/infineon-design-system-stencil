  <ifx-basic-table
    table-height="auto"
    rowHeight="{{ controlledProps['rowHeight'] }}"
    variant="{{ controlledProps['variant'] }}"></ifx-basic-table>
<h3 class="controls-title">Controls</h3>
<div class="controls">
  <ifx-button variant="secondary" (click)="toggleRowHeight()">Toggle RowHeight</ifx-button>
  <ifx-button variant="secondary" (click)="toggleVariant()">Toggle Variant</ifx-button>
</div>

<div class="state">
    <div><b>rowHeight:</b> {{ rowHeightOptions[rowHeightIndex] }}</div>
    <div><b>variant:</b> {{ variantOptions[variantIndex] }}</div>
</div>


<details class="code-details">
  <summary>View Code</summary>
  <div class="code-blocks">
    <h3>ifx-basic-table-example.ts</h3>
    <pre><code class="language-typescript" [innerHTML]="tsCode"></code></pre>
    
    <h3>ifx-basic-table-example.html</h3>
    <pre><code class="language-markup" [innerHTML]="htmlCode"></code></pre>
  </div>
</details>
