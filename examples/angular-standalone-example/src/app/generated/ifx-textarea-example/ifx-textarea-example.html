  <ifx-textarea
    caption="Caption text, description, error notification"

    error="false"

    name="textarea"
    placeholder="Placeholder"
    rows="5"
    value="true"

    <h3>ifx-textarea-example.html</h3>
    <pre><code class="language-markup" [innerHTML]="htmlCode"></code></pre>
  </div>
</details>
