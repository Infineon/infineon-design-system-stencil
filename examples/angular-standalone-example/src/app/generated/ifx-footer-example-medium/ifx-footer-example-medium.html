  <ifx-footer [copyrightText]="copyrightText">
    <div
      slot="socials"
      (consoleError)="handleConsoleError($any($event))">
      <ifx-link
        variant="title"
        aria-label="Follow us on Facebook"
        (consoleError)="handleConsoleError($any($event))"
        [href]="href">
        <ifx-icon [icon]="iconOptions[iconIndex]"></ifx-icon>
      </ifx-link>
      <ifx-link
        variant="title"
        aria-label="Follow us on Youtube"
        [href]="href">
        <ifx-icon [icon]="iconOptions[iconIndex]"></ifx-icon>
      </ifx-link>
      <ifx-link
        variant="title"
        aria-label="Follow us on Instagram"
        [href]="href">
        <ifx-icon [icon]="iconOptions[iconIndex]"></ifx-icon>
      </ifx-link>
      <ifx-link
        variant="title"
        aria-label="Follow us on LinkedIn"
        [href]="href">
        <ifx-icon [icon]="iconOptions[iconIndex]"></ifx-icon>
      </ifx-link>
      <ifx-link
        variant="title"
        aria-label="Follow us on Xing"
        [href]="href">
        <ifx-icon [icon]="iconOptions[iconIndex]"></ifx-icon>
      </ifx-link>
    </div>
    <div slot="info">
      <ifx-link
        variant="menu"
        target="_blank"
        [href]="href">Terms</ifx-link>
      <ifx-link
        variant="menu"
        target="_blank"
        [href]="href">Imprint</ifx-link>
      <ifx-link
        variant="menu"
        target="_blank"
        [href]="href">Privacy policy</ifx-link>
      <ifx-link
        variant="menu"
        target="_blank"
        [href]="href">Glossary</ifx-link>
    </div>
  </ifx-footer>

<h3 class="controls-title">Controls</h3>
<div class="controls controls-toggle">
  <ifx-button variant="secondary" (click)="toggleIcon()">Toggle Icon</ifx-button>
</div>
<div class="controls controls-input">
  <ifx-text-field label="copyrightText" type="text" [value]="stringifyValue(copyrightText)" (ifxInput)="updateCopyrightText(getControlInputValue($event))"></ifx-text-field>
  <ifx-text-field label="href" type="text" [value]="stringifyValue(href)" (ifxInput)="updateHref(getControlInputValue($event))"></ifx-text-field>
</div>

<div class="state">
  <div><b>copyrightText:</b> {{ stringifyValue(copyrightText) }}</div>
  <div><b>icon:</b> {{ stringifyValue(iconOptions[iconIndex]) }}</div>
  <div><b>href:</b> {{ stringifyValue(href) }}</div>
</div>

<details class="code-details">
  <summary>View Code</summary>
  <div class="code-blocks">
    <h3>ifx-footer-example-medium.ts</h3>
    <pre><code class="language-typescript" [innerHTML]="tsCode"></code></pre>

    <h3>ifx-footer-example-medium.html</h3>
    <pre><code class="language-markup" [innerHTML]="htmlCode"></code></pre>
  </div>
</details>
