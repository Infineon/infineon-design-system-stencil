<div class="ng-model-example">
	<h3>Boolean inputs (bound to the same value)</h3>
	<ifx-checkbox
		name="ngModelCheckbox"
		[checked]="booleanValue"
		(ifxChange)="handleBooleanChange($event)">
		Checkbox bound via ngModel
	</ifx-checkbox>

	<ifx-switch
		name="ngModelSwitch"
		[checked]="booleanValue"
		(ifxChange)="handleBooleanChange($event)">
		Switch bound via ngModel
	</ifx-switch>

	<h3>Text inputs (bound to the same value)</h3>
	<ifx-search-field
		name="ngModelSearchField"
		[value]="textValue"
		(ifxInput)="handleTextInput($event)"
		show-delete-icon="true"
		placeholder="Search..."></ifx-search-field>

	<ifx-text-field
		name="ngModelTextField"
		[(ngModel)]="textValue"
		show-delete-icon="true"
		placeholder="Type here..."></ifx-text-field>

	<ifx-textarea
		name="ngModelTextarea"
		[(ngModel)]="textValue"
		label="Message"
		placeholder="Write a longer message..."></ifx-textarea>

	<ifx-search-bar
		name="ngModelSearchBar"
		[(ngModel)]="textValue"
		is-open="true"
		autocomplete="on"></ifx-search-bar>
</div>
