<!DOCTYPE html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>Infineon Design System</title>

    <script
      type="module"
      src="/build/infineon-design-system-stencil.esm.js"
    ></script>
    <script nomodule src="/build/infineon-design-system-stencil.js"></script>

    <style defer>

    </style>

    <script></script>
  </head>

  <body>
    <ifx-navbar
      show-logo-and-appname="true"
      application-name="Application name"
      fixed="false"
      logo-href="http://google.com"
      logo-href-target="_self"
    >
      <ifx-navbar-item slot="left-item">
        Menu Item
      </ifx-navbar-item>
      
      <ifx-navbar-item slot="left-item">
        Menu Item
      </ifx-navbar-item>

      <ifx-search-bar slot="search-bar-right" is-open="true"> </ifx-search-bar>

      <ifx-navbar-item
        slot="right-item"
        target="_blank"
        href="http://google.com"
        show-label="false"
        icon="image-16"
        number-indicator=""
        hide-on-mobile=""
      >
      </ifx-navbar-item>
      <ifx-navbar-item
        slot="right-item"
        hide-on-mobile="true"
        show-label="false"
        icon="image-16"
        dot-indicator="false"
      >
      </ifx-navbar-item>

      <ifx-navbar-profile
        hide-on-mobile="true"
        slot="right-item"
        href=""
        user-name=""
        image-url=""
        show-label="true"
        target="_self"
        alt="profile image"
      >
      </ifx-navbar-profile>
    </ifx-navbar>

  </body>
</html>
